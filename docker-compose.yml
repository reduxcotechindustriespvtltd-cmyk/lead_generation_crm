services:
  db:
    image: postgres:16-alpine
    container_name: gsb_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gsb_crm
      POSTGRES_PASSWORD: gsb_crm_dev_password
      POSTGRES_DB: gsb_crm
    ports:
      - "5433:5432"
    volumes:
      - gsb_crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsb_crm -d gsb_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gsb_crm_pgdata:
